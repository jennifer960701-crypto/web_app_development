{% extends "base.html" %}
{% block content %}
<div class="row mb-4">
    <div class="col-12 d-flex justify-content-between align-items-center">
        <h2>我的收藏夾清單</h2>
        <button type="button" class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#newCollectionForm">
            <i class="bi bi-plus-lg"></i> 建立清單
        </button>
    </div>
</div>

<div class="collapse mb-4" id="newCollectionForm">
    <div class="card card-body bg-light">
        <form action="{{ url_for('collections.create') }}" method="POST" class="d-flex">
            <input type="text" name="name" class="form-control me-2" placeholder="輸入清單名稱 (例如: 本週菜單、減脂餐)..." required>
            <button type="submit" class="btn btn-success text-nowrap">建立</button>
        </form>
    </div>
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for collection in collections %}
    <div class="col">
        <div class="card h-100 border-primary">
            <div class="card-body text-center py-5">
                <h4 class="card-title text-primary"><i class="bi bi-folder2-open"></i> {{ collection.name }}</h4>
                <a href="{{ url_for('collections.detail', id=collection.id) }}" class="btn btn-outline-primary mt-3">查看清單內容</a>
            </div>
            <div class="card-footer bg-white d-flex justify-content-end border-top-0">
                <form action="{{ url_for('collections.delete', id=collection.id) }}" method="POST" onsubmit="return confirm('刪除收藏夾不會刪除食譜本身，確定要刪除嗎？');">
                    <button type="submit" class="btn btn-sm text-danger"><i class="bi bi-trash"></i> 刪除清單</button>
                </form>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center py-5">
        <p class="text-muted">還沒有建立任何收藏夾，快點擊右上角建立吧！</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
